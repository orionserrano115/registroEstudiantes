<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Estudiantes</title>

    <style>
@import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Inter:wght@300;400;600&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;

    background: url('img/university.jpg') no-repeat center center fixed;
    background-size: cover;

    color: #fff;
}
.container {
    max-width: 1200px;
    margin: 30px auto;
    padding: 20px;
}
}

h1 {
    text-align: center;
    margin-bottom: 20px;
    font-family: 'Merriweather', serif;
    font-weight: 700;
    letter-spacing: 1px;
}

/* Contenedor tipo “card académico” */
form, table {
    background: rgba(255, 255, 255, 0.92);
    color: #333;
    border-radius: 10px;
    padding: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

form {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
}

input {
    padding: 10px;
    min-width: 150px;
    flex: 1;

    border: 1px solid #ccc;
    border-radius: 6px;
    outline: none;
}

input:focus {
    border-color: #2c3e50;
    box-shadow: 0 0 5px rgba(44,62,80,0.3);
}

button {
    padding: 10px 15px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    background: #2c3e50;
    color: white;
    transition: 0.3s;
}

button:hover {
    background: #1a252f;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
}

th {
    background: #2c3e50;
    color: white;
    font-family: 'Merriweather', serif;
}

.btn-eliminar {
    background: #c0392b;
    color: white;
    border: none;
}

.btn-eliminar:hover {
    background: #922b21;
}
/* ===== RESPONSIVE ===== */

/* Tablets */
@media (max-width: 768px) {
    body {
        margin: 15px;
        padding: 10px;
    }

    form {
        flex-direction: column;
    }

    input {
        width: 100%;
    }

    button {
        width: 100%;
    }

    table {
        font-size: 14px;
    }
}

/* Celulares */
@media (max-width: 480px) {
    h1 {
        font-size: 20px;
    }

    th, td {
        padding: 6px;
        font-size: 12px;
    }

    form {
        gap: 8px;
    }
}
    </style>

</head>
<body>
<div class="container">
    <h1>Registro de Estudiantes</h1>

    <form id="formulario">

        <input type="hidden" id="id">

        <input
            type="text"
            id="nombre"
            placeholder="Nombre"
            required
        >

        <input
            type="text"
            id="apellido"
            placeholder="Apellido"
            required
        >

        <input
            type="text"
            id="cedula"
            placeholder="Cédula"
            required
        >

        <input
            type="number"
            id="edad"
            placeholder="Edad"
            required
        >

        <input
            type="text"
            id="curso"
            placeholder="Curso"
            required
        >

        <button type="submit">
            Guardar
        </button>

    </form>

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Cédula</th>
                <th>Edad</th>
                <th>Curso</th>
                <th>Fecha de Registro</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tablaEstudiantes"></tbody>

    </table>

<script>

let modoEdicion = false;
let estudianteId = null;

window.onload = function(){

    cargarEstudiantes();

    document
        .getElementById("formulario")
        .addEventListener("submit", async function(e){

            e.preventDefault();

            await agregarEstudiante();

        });

};

async function cargarEstudiantes(){

    const respuesta = await fetch('/cliente3/estudiantes');
    const estudiantes = await respuesta.json();

    let tbody =
        document.getElementById("tablaEstudiantes");

    tbody.innerHTML = "";

    estudiantes.forEach(estudiante => {

        tbody.innerHTML += `
        <tr>
            <td>${estudiante.id}</td>
            <td>${estudiante.nombre}</td>
            <td>${estudiante.apellido}</td>
            <td>${estudiante.cedula}</td>
            <td>${estudiante.edad}</td>
            <td>${estudiante.curso}</td>
            <td>${estudiante.created_at}</td>
            <td>

                <button
                    onclick="editarEstudiante(
                        ${estudiante.id},
                        '${estudiante.nombre}',
                        '${estudiante.apellido}',
                        '${estudiante.cedula}',
                        '${estudiante.edad}',
                        '${estudiante.curso}'
                    )">
                    Editar
                </button>

                <button
                    class="btn-eliminar"
                    onclick="eliminarEstudiante(${estudiante.id})">
                    Eliminar
                </button>

            </td>
        </tr>
        `;

    });

}

async function agregarEstudiante(){

    let nombre = document.getElementById("nombre").value;
    let apellido = document.getElementById("apellido").value;
    let cedula = document.getElementById("cedula").value;
    let edad = document.getElementById("edad").value;
    let curso = document.getElementById("curso").value;

    if(
        nombre=="" ||
        apellido=="" ||
        cedula=="" ||
        edad=="" ||
        curso==""
    ){
        alert("Complete todos los campos");
        return;
    }

    const datos = {
        nombre,
        apellido,
        cedula,
        edad,
        curso
    };

    let url = "/cliente3/estudiantes";
    let metodo = "POST";

    if(modoEdicion){
        url = `/cliente3/estudiantes/${estudianteId}`;
        metodo = "PUT";
    }

    const respuesta = await fetch(
        url,
        {
            method: metodo,
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(datos)
        }
    );

    const resultado = await respuesta.json();

    if(resultado.error){
        alert(resultado.error);
        return;
    }

    limpiarFormulario();

    modoEdicion = false;
    estudianteId = null;

    document.querySelector("button[type='submit']")
        .textContent = "Guardar";

    await cargarEstudiantes();

    alert(resultado.mensaje);

}

async function eliminarEstudiante(id){

    if(!confirm("¿Desea eliminar este estudiante?")){
        return;
    }

    await fetch(`/cliente3/estudiantes/${id}`, {
        method: "DELETE"
    });

    await cargarEstudiantes();

}

function editarEstudiante(
    id,
    nombre,
    apellido,
    cedula,
    edad,
    curso
){

    document.getElementById("nombre").value = nombre;
    document.getElementById("apellido").value = apellido;
    document.getElementById("cedula").value = cedula;
    document.getElementById("edad").value = edad;
    document.getElementById("curso").value = curso;

    estudianteId = id;
    modoEdicion = true;

    document.querySelector("button[type='submit']")
        .textContent = "Actualizar";

}

function limpiarFormulario(){

    document.getElementById("nombre").value="";
    document.getElementById("apellido").value="";
    document.getElementById("cedula").value="";
    document.getElementById("edad").value="";
    document.getElementById("curso").value="";

}

</script>
<script>
console.log("VERSION NUEVA 12345");
</script>
</div>
</body>
</html>
